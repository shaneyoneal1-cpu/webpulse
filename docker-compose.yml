version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webpulse-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-a-strong-random-key}
      - DATABASE_URL=sqlite:///./data/webpulse.db
      - CHECK_INTERVAL_SECONDS=${CHECK_INTERVAL_SECONDS:-300}
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webpulse-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
